<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segundo layout</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <div class="logo">Figma</div>
        <nav class="nav-links">
          <ul>
            <li>Produtos</li>
            <li>Soluções</li>
            <li>Comunidade</li>
            <li>Recursos</li>
            <li>Preços</li>
          </ul>
        </nav>
      </div>
      <div class="header-right">
        <a href="#">Entrar</a>
        <button class="btn-outline">Fale com vendas</button>
        <button class="btn-black">Comece sem custos</button>
      </div>
    </header>

    <main class="hero">
      <section class="hero-content">
        <h1>Figma Design</h1>
        <p>
          O Figma é uma ferramenta de design poderosa e colaborativa para
          equipes. Explore ideias e obtenha feedback, crie protótipos realistas
          e otimize.
        </p>
        <div class="hero-buttons">
          <button class="btn-black">Comece agora</button>
          <button class="btn-outline">Fale com a equipe</button>
        </div>
      </section>

      <section class="hero-image">
        <div class="image-placeholder">
          <img src="https://freesvg.org/img/Placeholder.png" alt="Ilustração" />
        </div>
      </section>
    </main>
  </body>
</html>
